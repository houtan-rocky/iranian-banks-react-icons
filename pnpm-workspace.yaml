packages:
  - 'packages/*'
  - 'apps/*'

onlyBuiltDependencies:
  - esbuild

allowBuilds:
  esbuild: true

catalogs:
  # React 19 runtime, types, and Vite React plugin
  react:
    react: ^19.2.0
    react-dom: ^19.2.0
    "@types/react": ^19.0.0
    "@types/react-dom": ^19.0.0
    "@vitejs/plugin-react": ^4.0.3

  # SVG build pipeline — babel, svgr, svgo, terser, camelcase, rimraf
  build:
    "@babel/core": ^7.15.5
    "@babel/preset-react": ^7.14.5
    "@svgr/cli": ^5.5.0
    "@svgr/core": ^5.5.0
    camelcase: ^6.2.0
    rimraf: ^3.0.2
    svgo: ^2.5.0
    terser: ^5.7.2

  # TypeScript, Vite, and linting
  tooling:
    typescript: ^5.0.2
    vite: ^4.4.5
    "@typescript-eslint/eslint-plugin": ^6.0.0
    "@typescript-eslint/parser": ^6.0.0

  # Release management
  releases:
    "@changesets/cli": ^2.26.2
